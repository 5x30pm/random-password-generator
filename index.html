    <link rel="stylesheet" href="style.css">

<body>

            <!-- Menu  -->
            <div class="menu">

                    <a href="https://github.com/5x30pm/random-password-generator.git">

                    <a

                    </a>
                    <a
                        href="https://t.me/user_5x30pm_support?text=Project%20%3A%20random_project_genrator%0ATopic%20%3A%20Feedback%0A%0A">

                </ul>
            </div>
            <!-- social media  -->

                    <!-- facebook  -->

                    <!-- Telegram  -->
                    <a href="https://t.me/user_5x30pm">

                    </a>
                    <!-- Linkedin  -->
                    <a href="https://www.linkedin.com/in/user-5x30pm">

    <div class="container">
        <h1>Generate a <br> <span>Random Password</span></h1>

        <!-- genrate pass input and copy button  -->
        <div class="password-box box-shadow">
            <input type="text" placeholder="Genrate Password" id="pass-inp">
            <img id="copy-img-btn" class="hover" src="./assets/copy.png">
        </div>

        <!-- div for both button  -->
        <div id="button-box">
            <button id="gen-pass" class="hover"><img src="./assets/generate.png">Generate Password</button>
            <button id="pre-pass" class="hover">Previous Password</button>
        </div>

        <!-- div for Printing Password  -->
        <div id="pass-list" class="box-shadow">
        </div>

    </div>
    <!-- footer  -->
    <footer>
